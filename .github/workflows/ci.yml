name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run ruff
        run: poetry run ruff check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run pytest
        run: poetry run pytest -v --tb=short

  compile:
    name: Compile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . --quiet

      - name: Compile Python files
        run: |
          python -m py_compile alembic/versions/001_initial.py
          python -m py_compile app/models/user.py
          python -m py_compile app/models/crawl_log.py
          python -m py_compile app/models/alert.py
          python -m py_compile app/models/product.py
          python -m py_compile app/models/price_history.py
          python -m py_compile app/models/base.py
          python -m py_compile app/celery_app.py
          python -m py_compile app/main.py
          python -m py_compile app/tasks/cleanup.py
          python -m py_compile app/tasks/crawl.py
          echo "All files compiled successfully"
